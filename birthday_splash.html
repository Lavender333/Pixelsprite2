<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 10th Birthday Mariah's!</title>
  <link rel="stylesheet" href="birthday_splash.css">
</head>
<body>

  <!-- Ambient background glow -->
  <div class="bg-glow"></div>

  <!-- Sparkles -->
  <span class="sparkle" style="left:6%;  top:12%; width:20px; height:20px; animation-delay:0s"></span>
  <span class="sparkle" style="left:18%; top:70%; width:13px; height:13px; animation-delay:0.5s"></span>
  <span class="sparkle" style="left:32%; top:25%; width:16px; height:16px; animation-delay:1.1s"></span>
  <span class="sparkle" style="left:48%; top:82%; width:11px; height:11px; animation-delay:0.8s"></span>
  <span class="sparkle" style="left:65%; top:14%; width:22px; height:22px; animation-delay:1.7s"></span>
  <span class="sparkle" style="left:79%; top:58%; width:15px; height:15px; animation-delay:0.3s"></span>
  <span class="sparkle" style="left:90%; top:22%; width:18px; height:18px; animation-delay:1.4s"></span>
  <span class="sparkle" style="left:93%; top:78%; width:12px; height:12px; animation-delay:0.9s"></span>
  <span class="sparkle" style="left:42%; top:5%;  width:10px; height:10px; animation-delay:2.0s"></span>
  <span class="sparkle" style="left:55%; top:92%; width:14px; height:14px; animation-delay:0.2s"></span>

  <!-- Confetti ribbons -->
  <div class="ribbon" style="left:5%;   background:#a855f7; animation-delay:0s;    animation-duration:5.5s"></div>
  <div class="ribbon" style="left:14%;  background:#fde68a; animation-delay:1.2s;  animation-duration:6.2s"></div>
  <div class="ribbon" style="left:23%;  background:#f472b6; animation-delay:0.6s;  animation-duration:5.8s"></div>
  <div class="ribbon" style="left:37%;  background:#c084fc; animation-delay:2.0s;  animation-duration:7.0s"></div>
  <div class="ribbon" style="left:50%;  background:#fde68a; animation-delay:0.4s;  animation-duration:6.5s"></div>
  <div class="ribbon" style="left:62%;  background:#e879f9; animation-delay:1.8s;  animation-duration:5.2s"></div>
  <div class="ribbon" style="left:74%;  background:#a855f7; animation-delay:0.9s;  animation-duration:6.8s"></div>
  <div class="ribbon" style="left:85%;  background:#fde68a; animation-delay:1.5s;  animation-duration:5.6s"></div>
  <div class="ribbon" style="left:93%;  background:#f472b6; animation-delay:2.4s;  animation-duration:7.2s"></div>

  <!-- Birthday card -->
  <main class="card" role="main" aria-label="Birthday splash page">
    <span class="balloons" aria-hidden="true">🎈🎂🎉</span>
    <p class="subtitle">Wishing you a magical day</p>
    <h1 class="headline">
      Happy 10th Birthday
      <span class="name-highlight">Mariah's</span>
    </h1>
    <div class="divider" aria-hidden="true"></div>
    <p class="message">
      May your special day sparkle with joy, laughter, and all the things that make you smile. 
      Here's to ten wonderful years — and many more magical adventures ahead! 🌟
    </p>
    <a class="cta-btn" href="index.html">Start Creating ✨</a>
  </main>

</body>
</html>
