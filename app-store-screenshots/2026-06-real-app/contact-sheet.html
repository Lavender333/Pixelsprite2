<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Sprite Vibe App Store Captures</title>
  <style>
    body {
      margin: 0;
      background: #10121a;
      color: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      padding: 24px 28px 8px;
      font-size: 30px;
      font-weight: 800;
    }

    h2 {
      margin: 24px 28px 12px;
      font-size: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      padding: 0 28px 8px;
    }

    figure {
      margin: 0;
      min-width: 0;
      padding: 10px;
      background: #191c29;
      border: 1px solid #303548;
      border-radius: 10px;
    }

    img {
      display: block;
      width: 100%;
      height: 230px;
      object-fit: contain;
      background: #05060a;
      border-radius: 6px;
    }

    figcaption {
      margin-top: 8px;
      color: #cbd1e8;
      font-size: 11px;
      line-height: 1.25;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header>Pixel Sprite Vibe App Store Captures</header>
  <main id="root"></main>
  <script>
    const groups = [
      ['iPad app previews', 'ipad/app-previews', ['app-preview-01-home.png', 'app-preview-02-studio.png', 'app-preview-03-animated-editor.png']],
      ['iPad screenshots', 'ipad/screenshots', ['screenshot-01-home.png', 'screenshot-02-studio-top.png', 'screenshot-03-studio-template-gallery.png', 'screenshot-04-editor-bunny-hop.png', 'screenshot-05-effects-menu.png', 'screenshot-06-use-creation.png', 'screenshot-07-save-to-gallery.png', 'screenshot-08-pixelverse.png', 'screenshot-09-gallery.png', 'screenshot-10-lavendercare-plus.png']],
      ['iPhone app previews', 'iphone/app-previews', ['app-preview-01-home.png', 'app-preview-02-studio.png', 'app-preview-03-animated-editor.png']],
      ['iPhone screenshots', 'iphone/screenshots', ['screenshot-01-home.png', 'screenshot-02-studio-top.png', 'screenshot-03-studio-template-gallery.png', 'screenshot-04-editor-bunny-hop.png', 'screenshot-05-effects-menu.png', 'screenshot-06-use-creation.png', 'screenshot-07-save-to-gallery.png', 'screenshot-08-pixelverse.png', 'screenshot-09-gallery.png', 'screenshot-10-lavendercare-plus.png']],
      ['Apple Watch screenshots', 'watch/screenshots', ['screenshot-01-home.png', 'screenshot-02-studio-top.png', 'screenshot-03-studio-template-gallery.png', 'screenshot-04-editor-bunny-hop.png', 'screenshot-05-effects-menu.png', 'screenshot-06-use-creation.png', 'screenshot-07-save-to-gallery.png', 'screenshot-08-pixelverse.png', 'screenshot-09-gallery.png', 'screenshot-10-lavendercare-plus.png']]
    ];

    const root = document.getElementById('root');
    groups.forEach(([title, folder, files]) => {
      const heading = document.createElement('h2');
      heading.textContent = title;
      root.appendChild(heading);

      const grid = document.createElement('section');
      grid.className = 'grid';
      files.forEach((file) => {
        const figure = document.createElement('figure');
        const image = document.createElement('img');
        image.src = `${folder}/${file}`;
        image.alt = file;
        const caption = document.createElement('figcaption');
        caption.textContent = file;
        figure.append(image, caption);
        grid.appendChild(figure);
      });
      root.appendChild(grid);
    });
  </script>
</body>
</html>
